{% extends "layout.html" %}

{% block container %}

<div class="flex items-center justify-center w-full min-h-[70vh] py-10">

    <div class="w-full max-w-md bg-white p-8 rounded-2xl shadow-xl border border-gray-100">
        <h3 class="text-2xl font-bold text-center mb-8 text-gray-800">Inscripción General</h3>

        <form method="POST" action="{{ url_for('cursos.inscribir') }}" class="space-y-6">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}"/> 

            <div>
                <label for="alumno_id" class="block mb-2 text-sm font-semibold text-gray-700">Selecciona un Alumno</label>
                <select name="alumno_id" id="alumno_id" required
                    class="block w-full px-4 py-3 text-gray-700 bg-gray-50 border border-gray-200 rounded-xl focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-all appearance-none">
                    <option value="" disabled selected>Elige un alumno...</option>
                    {% for alumno in alumnos %}
                        <option value="{{ alumno.id }}">{{ alumno.nombre }} {{ alumno.apaterno }} (ID: {{ alumno.id }})</option>
                    {% endfor %}
                </select>
            </div>

            <div>
                <label for="curso_id" class="block mb-2 text-sm font-semibold text-gray-700">Selecciona el Curso</label>
                <select name="curso_id" id="curso_id" required
                    class="block w-full px-4 py-3 text-gray-700 bg-gray-50 border border-gray-200 rounded-xl focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-all appearance-none">
                    <option value="" disabled selected>Elige un curso...</option>
                    {% for curso in cursos %}
                        <option value="{{ curso.id }}">{{ curso.nombre }} - Maestro: {{ curso.maestro.nombre }}</option>
                    {% endfor %}
                </select>
            </div>

            <div class="flex flex-col gap-3 pt-4">
                <button type="submit"
                    class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-4 rounded-xl shadow-lg shadow-blue-100 transition-all active:scale-95">
                    Confirmar Inscripción
                </button>
                
                <a href="{{ url_for('cursos.index') }}"
                    class="w-full text-center text-sm font-semibold text-gray-500 hover:text-gray-700 py-2 transition-colors">
                    Cancelar y volver
                </a>
            </div>
        </form>
    </div>

</div>

{% endblock %}
